<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

    <div class="container">
        <br>
        <div class="row">
            <div *ngFor="let product of products; let productId = index" class="col-sm">
                <a [routerLink]="[ productId ]">
                    <div class="card">
                        <img src="{{ product.coverImage }}" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">{{ product.name }}</h5>
                            <p class="card-text">{{ product.description }}</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

</html>
